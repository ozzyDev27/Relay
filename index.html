<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Relay for Life!</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Winky+Sans:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet" />
</head>
<body>
    <div class="firstpage">
        <div class="chart-container">
            <div class="chartoutline"></div>
            <div class="pie-chart" id="pieChart">
                <div class="firsttext-wrapper">
                    <div class="firsttext" id="centerText">
                        <b>40%</b> of Canadians will be diagnosed with cancer in their lifetime.
                      </div>                      
                </div>
            </div>
        </div>

        <svg xmlns="http://www.w3.org/2000/svg" class="scrolldownarrow" viewBox="0 0 30.021 30.021">
            <g>
                <path d="M28.611,13.385l-11.011,9.352c-0.745,0.633-1.667,0.949-2.589,0.949c-0.921,0-1.842-0.316-2.589-0.949L1.411,13.385c-1.684-1.43-1.89-3.954-0.46-5.638c1.431-1.684,3.955-1.89,5.639-0.459l8.421,7.151l8.42-7.151c1.686-1.43,4.209-1.224,5.639,0.459C30.5,9.431,30.294,11.955,28.611,13.385z"/>
            </g>
        </svg>
    </div>

    <div class="secondpage">
        <div class="thatmeans">
            <p>That means for every <b>5 Canadians</b>, </p>
            <p><b>2</b> will be diagnosed with cancer in their lifetime.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
